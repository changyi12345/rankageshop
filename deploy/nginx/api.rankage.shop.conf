# API — api.rankage.shop
# Copy to: /etc/nginx/sites-available/api.rankage.shop.conf
#
# One-time: copy rate-limit-zones.conf into nginx http { } block:
#   sudo cp /var/www/rankageshop/deploy/nginx/rate-limit-zones.conf /etc/nginx/conf.d/rankage-rate-limit-zones.conf
#   Add inside http { }: include /etc/nginx/conf.d/rankage-rate-limit-zones.conf;

server {
    listen 80;
    listen [::]:80;
    server_name api.rankage.shop;

    # Certbot will add SSL blocks here after: certbot --nginx -d api.rankage.shop

    client_max_body_size 10M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location /api/auth/ {
        limit_req zone=rankage_api_auth burst=15 nodelay;
        limit_conn rankage_api_conn 20;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        limit_req zone=rankage_api_general burst=80 nodelay;
        limit_conn rankage_api_conn 40;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
