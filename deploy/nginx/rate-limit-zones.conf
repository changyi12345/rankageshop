# Rate limit zones for RanKageShop API (include once inside http { } in /etc/nginx/nginx.conf)
# Example in nginx.conf:
#   include /etc/nginx/conf.d/rankage-rate-limit-zones.conf;

limit_req_zone $binary_remote_addr zone=rankage_api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=rankage_api_auth:10m rate=20r/m;
limit_conn_zone $binary_remote_addr zone=rankage_api_conn:10m;
