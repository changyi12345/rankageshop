# Frontend — rankage.shop
# Copy to: /etc/nginx/sites-available/rankage.shop.conf

server {
    listen 80;
    listen [::]:80;
    server_name rankage.shop www.rankage.shop;

    root /var/www/rankageshop-web;
    index index.html;

    # Certbot will add SSL blocks here after: certbot --nginx -d rankage.shop -d www.rankage.shop

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
